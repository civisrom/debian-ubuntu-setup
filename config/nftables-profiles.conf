#!/usr/bin/env bash
# nftables-profiles.conf — описание профилей nftables
# Подгружается из system-setup.sh через `source` на этапе инициализации.
#
# ════════════════════════════════════════════════════════════════════════════
#  МАНУАЛ ПО РАБОТЕ С ФАЙЛОМ
# ════════════════════════════════════════════════════════════════════════════
#
# ── ЧТО ЭТО ТАКОЕ ───────────────────────────────────────────────────────────
# Файл описывает каталог nftables-профилей, которые предлагаются пользователю
# в интерактивном меню system-setup.sh (секция «nftables Firewall»). Каждый
# профиль — это готовая пара «конфиг правил + скрипт настройки логирования»,
# которую скрипт установит из /opt/nftables/ (обычно распаковывается из
# opt.7z) в /etc/nftables.conf и применит через `nft -f`.
#
# Скрипт сначала пробует  загрузить этот файл из ${SCRIPT_DIR}/config/. Если
# файла нет (например, system-setup.sh скачан отдельно через install.sh без
# репозитория) — используется встроенный fallback в самом скрипте. Поэтому
# если вы ПРАВИТЕ профили, убедитесь, что вы запускаете system-setup.sh из
# клона репозитория рядом с этим файлом — иначе ваши правки не подхватятся.
#
# ── СТРУКТУРА: ЧЕТЫРЕ ПАРАЛЛЕЛЬНЫХ МАССИВА ──────────────────────────────────
# Профили хранятся в четырёх bash-массивах с явной индексацией (1..N):
#
#   NFT_PROFILE_NAMES[i]         — короткий идентификатор профиля
#                                  (используется в логах и выводе)
#   NFT_PROFILE_DESCRIPTIONS[i]  — строка, показываемая в меню выбора
#   NFT_PROFILE_CONFIGS[i]       — имя .conf-файла в /opt/nftables/
#   NFT_PROFILE_LOGSCRIPTS[i]    — имя .sh-файла в /opt/nftables/logging/
#
# Все четыре массива ДОЛЖНЫ иметь одинаковый набор индексов. Если по индексу
# i заполнен только NFT_PROFILE_NAMES[i], а остальные — нет, профиль окажется
# сломанным: меню покажет пустые поля, а установка упадёт с ошибкой
# «Config file not found».
#
# Плюс две скалярные переменные:
#
#   NFT_PROFILES_COUNT    — общее количество профилей (верхняя граница цикла
#                           меню и валидации ввода). ОБЯЗАТЕЛЬНО обновлять
#                           при добавлении/удалении профиля.
#   NFT_DEFAULT_PROFILE   — номер профиля, который подставляется при пустом
#                           ответе пользователя. Должен быть в диапазоне
#                           1..NFT_PROFILES_COUNT.
#
# ── ПРАВИЛА ИМЕНОВАНИЯ ──────────────────────────────────────────────────────
#
#  1) NFT_PROFILE_NAMES (идентификатор)
#     • Только строчные латинские буквы, цифры и дефис: [a-z0-9-]
#     • Без пробелов, подчёркиваний, кириллицы и спецсимволов — имя попадает
#       в `print_success "Installed ... (${NFTABLES_PROFILE})"` и в итоговое
#       summary, а также используется в сообщениях об ошибках.
#     • Длина — до ~30 символов, чтобы меню оставалось читабельным.
#     • Должен быть УНИКАЛЬНЫМ среди всех профилей.
#     • Примеры: "relay", "docker", "relay-wg-autossh-v2", "ge-docker-v2-eth0"
#
#  2) NFT_PROFILE_DESCRIPTIONS (строка меню)
#     • Произвольный человекочитаемый текст, можно кириллицу и Unicode-тире.
#     • Рекомендуемый формат: "<name> — <краткое описание назначения>", где
#       <name> визуально совпадает с NFT_PROFILE_NAMES[i] (для ориентации).
#     • Желательно выровнять тире в колонку пробелами, чтобы меню выглядело
#       аккуратно — смотрите уже существующие строки как образец.
#     • Максимум ~70 символов, иначе перенос строки на узких терминалах.
#
#  3) NFT_PROFILE_CONFIGS (имя .conf-файла)
#     • ТОЛЬКО базовое имя файла, БЕЗ пути. Скрипт сам допишет префикс
#       /opt/nftables/ (см. system-setup.sh:3788).
#     • Расширение .conf обязательно.
#     • Файл с таким именем ДОЛЖЕН реально существовать в /opt/nftables/
#       после распаковки opt.7z — иначе шаг 5 установки конфига упадёт
#       с ошибкой «Config file not found» и пропустит установку.
#     • Рекомендуемая схема имени: <роль>_nftables[_<модификатор>].conf
#       Например: "relay_nftables.conf", "docker_nftables.conf",
#       "relay_host_nftables_wg_autossh_v2.conf".
#     • Допустимы латинские буквы, цифры, подчёркивание, дефис, точка.
#       Пробелы и кириллицу НЕ использовать.
#
#  4) NFT_PROFILE_LOGSCRIPTS (имя лог-скрипта)
#     • ТОЛЬКО базовое имя файла, БЕЗ пути. Скрипт сам допишет префикс
#       /opt/nftables/logging/ (см. system-setup.sh:3845).
#     • Расширение .sh обязательно, скрипт должен быть валидным bash.
#     • Файл ДОЛЖЕН существовать в /opt/nftables/logging/, иначе шаг 6
#       напечатает предупреждение и пропустит установку логирования
#       (без фатального падения).
#     • Скрипт вызывается через `bash "$LOGGING_SCRIPT"` и должен завершаться
#       кодом 0 при успехе. Типично он настраивает rsyslog/journald-правила
#       для сообщений nftables (`log prefix "..."`).
#     • Если у профиля нет лог-скрипта — ОСТАВЬТЕ запись в массиве пустой
#       строкой, НЕ удаляйте индекс. Скрипт проверяет `-n "$NFTABLES_LOG_SCRIPT"`
#       и корректно пропустит шаг 6.
#     • Рекомендуется называть парно с конфигом: если конфиг
#       "relay_host_nftables_wg_autossh_v2.conf", то скрипт —
#       "relay_host_nftables_wg_autossh_v2.sh" (совпадает до расширения).
#
# ── КАК ДОБАВИТЬ НОВЫЙ ПРОФИЛЬ ──────────────────────────────────────────────
#
#  Шаг 1. Положите файлы в archive/на хост:
#           /opt/nftables/<ваш_конфиг>.conf
#           /opt/nftables/logging/<ваш_лог_скрипт>.sh     (если нужен)
#         Если используется opt.7z — добавьте файлы в архив, пересоберите
#         его и обновите checksum через хук репозитория.
#
#  Шаг 2. В КАЖДЫЙ из четырёх массивов ниже добавьте запись с новым
#         индексом (следующий свободный номер). Проще всего — в существующий
#         блок `NFT_PROFILE_*+=( ... )` в конце файла, либо создать новый
#         блок `+=( [N]="..." )`.
#
#  Шаг 3. Увеличьте NFT_PROFILES_COUNT на единицу.
#
#  Шаг 4. Если новый профиль должен стать дефолтным — обновите
#         NFT_DEFAULT_PROFILE. Иначе не трогайте.
#
#  Шаг 5. Проверьте синтаксис файла: `bash -n nftables-profiles.conf`
#         (файл source-ится, поэтому любая синтаксическая ошибка уронит
#         system-setup.sh в самом начале).
#
#  Шаг 6. Запустите system-setup.sh интерактивно и убедитесь, что новый
#         профиль появился в меню и устанавливается без ошибок.
#
# ── КАК УДАЛИТЬ ПРОФИЛЬ ─────────────────────────────────────────────────────
#
#  Вариант А (рекомендуется, если профиль НЕ последний): удалите запись из
#  всех четырёх массивов по этому индексу. ВАЖНО: цикл меню в system-setup.sh
#  идёт `for i in $(seq 1 "$NFT_PROFILES_COUNT")` и выводит строки по индексу.
#  Если в середине образуется «дырка» (например, удалили [5]), меню в этом
#  месте покажет пустую строку, а валидация ввода разрешит выбрать «5» и
#  затем упадёт на отсутствующем конфиге. Поэтому либо перенумеруйте
#  следующие профили (сдвиньте вниз), либо используйте вариант Б.
#
#  Вариант Б (проще): закомментируйте записи во всех четырёх массивах,
#  уменьшите NFT_PROFILES_COUNT так, чтобы цикл дошёл только до последнего
#  «живого» профиля, и при необходимости поменяйте NFT_DEFAULT_PROFILE.
#
# ── ЧАСТЫЕ ОШИБКИ ───────────────────────────────────────────────────────────
#
#  • «Invalid selection: N, using default» в меню — номер вне диапазона
#    1..NFT_PROFILES_COUNT. Проверьте, что вы увеличили NFT_PROFILES_COUNT
#    после добавления профиля.
#
#  • «Config file not found: /opt/nftables/<имя>.conf» — имя в
#    NFT_PROFILE_CONFIGS не совпадает с реальным файлом. Проверьте:
#      ls /opt/nftables/*.conf
#
#  • Пустая строка в меню на месте профиля — индекс заполнен не во всех
#    четырёх массивах. Сверьтесь: все массивы должны иметь одинаковый набор
#    индексов.
#
#  • Меню показывает меньше профилей, чем определено — не увеличен
#    NFT_PROFILES_COUNT. Цикл заканчивается на старом значении.
#
#  • system-setup.sh падает в самом начале с «syntax error» — ошибка в
#    этом файле (несбалансированные скобки, кавычки и т.п.). Запустите
#    `bash -n config/nftables-profiles.conf` для проверки.
#
# ════════════════════════════════════════════════════════════════════════════

NFT_PROFILES_COUNT=9
NFT_DEFAULT_PROFILE=2

# ── Basic profiles ──────────────────────────────────────────────────────────────

# Profile names (used as identifiers)
NFT_PROFILE_NAMES=(
    [1]="relay"
    [2]="docker"
    [3]="native"
)

# Menu descriptions
NFT_PROFILE_DESCRIPTIONS=(
    [1]="relay  — for relay/proxy servers"
    [2]="docker — for servers with Docker (default)"
    [3]="native — for standard servers without Docker"
)

# Config filenames (in /opt/nftables/)
NFT_PROFILE_CONFIGS=(
    [1]="relay_nftables.conf"
    [2]="docker_nftables.conf"
    [3]="native_nftables.conf"
)

# Logging script filenames (in /opt/nftables/logging/)
NFT_PROFILE_LOGSCRIPTS=(
    [1]="relay_logging.sh"
    [2]="docker_logging.sh"
    [3]="native_logging.sh"
)

# ── v2 profiles (advanced) ──────────────────────────────────────────────────────

# Relay + WireGuard + autossh variants
NFT_PROFILE_NAMES+=(
    [4]="relay-wg-autossh-v2"
    [5]="relay-wg-autossh-v2-ge2"
    [6]="relay-wg-autossh-v2-ge2-eth0"
)

NFT_PROFILE_DESCRIPTIONS+=(
    [4]="relay-wg-autossh-v2          — relay + WireGuard + autossh"
    [5]="relay-wg-autossh-v2-ge2      — relay + WG + autossh + ge2 iface"
    [6]="relay-wg-autossh-v2-ge2-eth0 — relay + WG + autossh + ge2 + eth0"
)

NFT_PROFILE_CONFIGS+=(
    [4]="relay_host_nftables_wg_autossh_v2.conf"
    [5]="relay_host_nftables_wg_autossh_v2_ge2.conf"
    [6]="relay_host_nftables_wg_autossh_v2_ge2_eth0.conf"
)

NFT_PROFILE_LOGSCRIPTS+=(
    [4]="relay_host_nftables_wg_autossh_v2.sh"
    [5]="relay_host_nftables_wg_autossh_v2_ge2.sh"
    [6]="relay_host_nftables_wg_autossh_v2_ge2_eth0.sh"
)

# GE Docker host variants
NFT_PROFILE_NAMES+=(
    [7]="ge-docker-v2"
    [8]="ge-docker-v2-eth0"
)

NFT_PROFILE_DESCRIPTIONS+=(
    [7]="ge-docker-v2      — GE Docker host"
    [8]="ge-docker-v2-eth0 — GE Docker host + eth0"
)

NFT_PROFILE_CONFIGS+=(
    [7]="ge_docker_host_nftables_v2.conf"
    [8]="ge_docker_host_nftables_v2_eth0.conf"
)

NFT_PROFILE_LOGSCRIPTS+=(
    [7]="ge_docker_host_nftables_v2.sh"
    [8]="ge_docker_host_nftables_v2_eth0.sh"
)

# NL nginx host
NFT_PROFILE_NAMES+=(
    [9]="nl-nginx-wg-easy"
)

NFT_PROFILE_DESCRIPTIONS+=(
    [9]="nl-nginx-wg-easy  — NL nginx host + wg-easy"
)

NFT_PROFILE_CONFIGS+=(
    [9]="nl_nginx_host_nftables_v2_wg-easy.conf"
)

NFT_PROFILE_LOGSCRIPTS+=(
    [9]="nl_nginx_host_nftables_v2_wg-easy.sh"
)
